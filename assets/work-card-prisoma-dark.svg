<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 150" width="395" height="150" role="img" aria-label="prisoma (research): Auditable capture-intervention-replay research for VLA-policy diagnosis. PID stays conditional on explicit validation gates.">
  <defs>
    <radialGradient id="wash0" cx="8%" cy="0%" r="120%"><stop offset="0%" stop-color="#241a44" stop-opacity="0.9"/><stop offset="60%" stop-color="#241a44" stop-opacity="0"/></radialGradient>
  </defs>
  <style>
    :root { --accent: #a78bfa; }
    .card       { fill: #0d1117; fill-opacity: 1; stroke: #ffffff; stroke-opacity: 0.09; stroke-width: 1; }
    .title      { font: 700 17px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .desc       { font: 400 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #9da7b3; }
    .badge      { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .chip       { fill: #0d1117; fill-opacity: 0.6; stroke-width: 1.3; }
    .chip-label { font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .c0.title { fill: #a78bfa; } .c0.rule { fill: #a78bfa; } .c0.spine { stroke: #a78bfa; } .c0.badge { fill: #a78bfa; } .c0.chip { stroke: #a78bfa; } .c0.chip-label { fill: #a78bfa; } .c0.glyph-fill { fill: #a78bfa; } .c0.glyph-stroke { stroke: #a78bfa; }
    text { paint-order: stroke; stroke: #0d1117; stroke-width: 2.6; stroke-linejoin: round; }
    /* Hover / click effects — visible when the SVG is viewed directly or
       embedded inline or via object (GitHub img sandboxes internal
       :hover, so these are progressive enhancement for every other context).
       Gated to @media (hover: hover) so touch devices don't get sticky
       :hover states that change card colours after a tap. */
    @media (hover: hover) {
      .card-group {
        cursor: pointer;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                    filter 0.25s ease;
      }
      .card-group:hover {
        transform: translateY(-4px);
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.45));
      }
      .card-group:hover .card { stroke-opacity: 0.22; }
      .card-group:hover .spine {
        stroke-width: 5;
        filter: drop-shadow(0 0 5px var(--accent));
      }
      .card-group:hover .wash { opacity: 1; }
      .card-group:hover .title { filter: drop-shadow(0 0 4px var(--accent)); }
      .card-group:active {
        transform: translateY(-1px);
        filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.3));
        transition: transform 0.08s ease, filter 0.08s ease;
      }
      @media (prefers-reduced-motion: reduce) {
        .card-group, .card-group:hover, .card-group:active {
          transition: none; transform: none;
        }
      }
    }
  </style>
  <g class="card-group">
    <rect x="1" y="0" width="393" height="150" rx="14" class="card"/>
    <rect x="1" y="0" width="393" height="150" rx="14" fill="url(#wash0)" class="wash"/>
    <path d="M2.5 14 v122" class="spine c0" stroke-width="4" stroke-linecap="round"/>
    <text x="23" y="38" class="title c0" textLength="91" lengthAdjust="spacingAndGlyphs">prisoma</text>
    <rect x="23" y="46" width="34" height="2.5" rx="1.25" class="rule c0"/>
    <circle cx="366" cy="22" r="5" fill="none" stroke-width="1.4" class="glyph-stroke c0"/><circle cx="366" cy="22" r="1.6" class="glyph-fill c0"/><text x="355" y="27" text-anchor="end" class="badge c0">research</text>
    <text x="23" y="60" class="desc">Auditable capture-intervention-replay research</text>
    <text x="23" y="78" class="desc">for VLA-policy diagnosis. PID stays conditional</text>
    <text x="23" y="96" class="desc">on explicit validation gates.</text>
    <g><rect x="23" y="110" width="50" height="22" rx="6" class="chip c0"/><text x="48" y="125" text-anchor="middle" class="chip-label c0">Rust</text></g>
    <g><rect x="81" y="110" width="66" height="22" rx="6" class="chip c0"/><text x="114" y="125" text-anchor="middle" class="chip-label c0">Python</text></g>
  </g>
</svg>
