    <text x="23" y="38" class="title c0" textLength="117" lengthAdjust="spacingAndGlyphs">galadriel</text>
    <rect x="23" y="46" width="34" height="2.5" rx="1.25" class="rule c0"/>
    <g transform="translate(365 16) scale(0.78)"><path d="M2 6 V4.4 a4 4 0 0 1 8 0 V6" fill="none" class="glyph-stroke c0" stroke-width="1.6"/><rect x="0" y="6" width="12" height="9" rx="1.6" class="glyph-fill c0"/></g><text x="360" y="28" text-anchor="end" class="badge c0">private</text>
    <text x="23" y="60" class="desc">Galadriel&apos;s Mirror: cross-sensor spoof detection</text>
    <text x="23" y="78" class="desc">via Partial Information Decomposition, watching</text>
    <text x="23" y="96" class="desc">crebain&apos;s sensor fusion. The security client.</text>
    <g><rect x="23" y="110" width="50" height="22" rx="6" class="chip c0"/><text x="48" y="125" text-anchor="middle" class="chip-label c0">Rust</text></g>
    <g class="emblem" aria-hidden="true"><circle cx="355" cy="120" r="13" class="em-mute" stroke-width="1.2" stroke-opacity="0.5"/><circle cx="355" cy="120" r="6.5" class="em-mute" stroke-width="1" stroke-opacity="0.3"/><path d="M344 120 H366 M355 109 V131" class="em-mute" stroke-width="1" stroke-opacity="0.22"/><line x1="342.8" y1="115.6" x2="349.4" y2="118.0" class="em-mute" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/><circle cx="342.8" cy="115.6" r="1.5" class="em-mutef" fill-opacity="0.85"/><line x1="342.9" y1="124.9" x2="349.5" y2="122.2" class="em-mute" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/><circle cx="342.9" cy="124.9" r="1.5" class="em-mutef" fill-opacity="0.85"/><line x1="349.3" y1="131.7" x2="352.4" y2="125.4" class="em-mute" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/><circle cx="349.3" cy="131.7" r="1.5" class="em-mutef" fill-opacity="0.85"/><circle cx="355" cy="120" r="2" class="em-mutef" fill-opacity="0.95"/><line x1="364.2" y1="110.8" x2="374.7" y2="109.5" class="glyph-stroke c0" stroke-width="1.7" stroke-linecap="round"/><circle cx="364.2" cy="110.8" r="1.8" class="glyph-fill c0"/><path d="M374.7 106.9 L377.3 109.5 L374.7 112.1 L372.1 109.5 Z" class="glyph-fill c0"/></g>
  </g>
